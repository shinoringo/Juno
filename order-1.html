<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JUNO Order</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a0a1e;--void:#1a0a1e;--deep:#2a1a30;--panel:#2e1a35;
  --rim:#4a2a55;--muted:#7a5a88;--soft:#c0a0d0;--text:#fff0fe;
  --amber:#f0a0c8;--gold:#ffccee;--ember:#e060a0;--rose:#ff80c0;
  --sage:#80d0c0;--r:16px;
  --grad-start:#f9a8d4;--grad-end:#a5f3fc;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:linear-gradient(135deg,var(--grad-start) 0%,#e0aaff 40%,var(--grad-end) 100%);background-attachment:fixed;color:#2a0a30;min-height:100vh;padding-bottom:200px}

/* HERO */
.hero{background:linear-gradient(160deg,rgba(249,168,212,.85) 0%,rgba(192,132,252,.7) 50%,rgba(165,243,252,.85) 100%);padding:36px 20px 24px;text-align:center;position:relative;overflow:hidden;backdrop-filter:blur(2px)}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(255,255,255,.35) 0%,transparent 70%);pointer-events:none}

/* JUNO LOGO */
.juno-logo{position:relative;z-index:1;margin-bottom:4px}
.juno-logo-text{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,10vw,3.4rem);font-weight:700;letter-spacing:.18em;background:linear-gradient(135deg,#be185d,#7c3aed,#0e7490);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;text-shadow:none;filter:drop-shadow(0 2px 8px rgba(126,34,206,.25))}
.juno-tagline{font-size:.68rem;letter-spacing:5px;text-transform:uppercase;color:#7c3aed;opacity:.8;margin-top:2px;margin-bottom:10px}

.hero-title{font-family:'Playfair Display',serif;font-size:clamp(1rem,4vw,1.3rem);font-weight:700;color:#5b21b6;line-height:1.2;margin-bottom:6px;letter-spacing:.06em;opacity:.85}
.hero-sub{font-size:.8rem;color:#6b21a8;opacity:.75}
.grp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.5);border:1px solid rgba(126,34,206,.3);border-radius:20px;padding:6px 16px;margin-top:14px;font-size:.85rem;color:#6b21a8;cursor:pointer;transition:all .2s;backdrop-filter:blur(4px)}
.grp-badge:hover{background:rgba(255,255,255,.7)}

/* HOT */
.hot-wrap{margin:16px 16px 0;background:rgba(255,255,255,.45);border:1px solid rgba(126,34,206,.2);border-radius:var(--r);padding:16px;display:none;backdrop-filter:blur(8px)}
.hot-lbl{font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:#7c3aed;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.hot-lbl::after{content:'';flex:1;height:1px;background:rgba(126,34,206,.2)}
.hot-item{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.5);border-radius:10px;padding:9px 12px;border:1px solid rgba(126,34,206,.15);margin-bottom:7px;animation:fi .4s ease both}
.hot-item:nth-child(1){animation-delay:.05s}.hot-item:nth-child(2){animation-delay:.1s}.hot-item:nth-child(3){animation-delay:.15s}
@keyframes fi{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
.hot-rank{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;min-width:22px;color:rgba(126,34,206,.25)}
.hot-rank.r1{color:#7c3aed}.hot-rank.r2{color:#a855f7}
.hot-name{flex:1;font-size:.9rem;font-weight:500;color:#3b0764}
.hot-cnt{font-size:.72rem;color:#7c3aed}

/* BODY */
.bw{padding:16px;max-width:520px;margin:0 auto}
.cat-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:16px;scrollbar-width:none;padding-bottom:2px}
.cat-row::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;padding:6px 16px;border-radius:24px;border:1px solid rgba(126,34,206,.25);background:rgba(255,255,255,.5);color:#6b21a8;cursor:pointer;white-space:nowrap;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.8rem;transition:all .2s;backdrop-filter:blur(4px)}
.cat-tab:hover{border-color:#7c3aed;color:#5b21b6}
.cat-tab.on{background:rgba(124,58,237,.85);border-color:#7c3aed;color:white}
.sec-lbl{font-size:.68rem;letter-spacing:2.5px;text-transform:uppercase;color:#7c3aed;margin-bottom:10px;font-weight:600;opacity:.8}

.prod-list{display:flex;flex-direction:column;gap:8px}
.p-card{background:rgba(255,255,255,.65);border:1px solid rgba(126,34,206,.2);border-radius:14px;display:flex;align-items:center;gap:12px;padding:13px 14px;transition:border-color .2s,background .2s,transform .15s;backdrop-filter:blur(6px)}
.p-card:hover{border-color:#a855f7;transform:translateX(2px)}
.p-card.active{border-color:#7c3aed;background:rgba(167,139,250,.2)}
.p-emo{font-size:1.6rem;width:38px;text-align:center;flex-shrink:0}
.p-info{flex:1;min-width:0}
.p-name{font-weight:600;font-size:.9rem;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1e0533}
.p-meta{font-size:.7rem;color:#7c3aed;display:flex;align-items:center;gap:5px}
.odot{width:5px;height:5px;border-radius:50%;display:inline-block}
.odot-owner{background:#0e9488}.odot-tenant{background:#e879a0}
.p-price{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:#7c3aed;flex-shrink:0}
.qty-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
.q-btn{width:28px;height:28px;border-radius:50%;border:1px solid rgba(126,34,206,.35);background:rgba(255,255,255,.6);color:#7c3aed;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.q-btn:hover{background:#7c3aed;border-color:#7c3aed;color:white}
.q-num{min-width:20px;text-align:center;font-weight:700;font-size:.95rem;color:#5b21b6}

/* CART DRAWER */
#cart-drawer{position:fixed;bottom:0;left:0;right:0;z-index:80;transform:translateY(100%);transition:transform .36s cubic-bezier(0.34,1.15,0.64,1)}
#cart-drawer.show{transform:none}
.ci{max-width:520px;margin:0 auto;background:rgba(255,240,254,.95);border:1px solid rgba(126,34,206,.25);border-bottom:none;border-radius:20px 20px 0 0;box-shadow:0 -12px 40px rgba(126,34,206,.2);padding:14px 18px;backdrop-filter:blur(12px)}
.cart-pull{width:36px;height:3px;border-radius:2px;background:rgba(126,34,206,.3);margin:0 auto 12px}
.cart-hd{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding-bottom:10px;border-bottom:1px solid rgba(126,34,206,.15);margin-bottom:10px}
.cart-hl{display:flex;align-items:center;gap:8px}
.cb{background:linear-gradient(135deg,#e879a0,#7c3aed);color:white;border-radius:50%;width:20px;height:20px;font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.cart-lbl{font-weight:600;font-size:.9rem;color:#3b0764}
.cart-ttl{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:#7c3aed}
.cart-body{display:none}
.cart-body.open{display:block}
.cr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:.85rem;border-bottom:1px solid rgba(126,34,206,.1);color:#5b21b6}
.cr:last-of-type{border:none}
.ctr{display:flex;justify-content:space-between;padding-top:10px;margin-top:6px;border-top:1px solid rgba(126,34,206,.2);font-weight:700;font-size:1rem;color:#3b0764}
.ctr span:last-child{font-family:'Playfair Display',serif;color:#7c3aed;font-size:1.2rem}
.pay-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0 10px}
.po{border:1px solid rgba(126,34,206,.25);background:rgba(255,255,255,.6);border-radius:12px;padding:9px 6px;text-align:center;cursor:pointer;transition:all .2s;color:#6b21a8;font-size:.78rem;font-family:'Zen Kaku Gothic New',sans-serif}
.po .pi{font-size:1.2rem;display:block;margin-bottom:2px}
.po.sel-paypay{border-color:#ff6680;background:rgba(255,102,128,.15);color:#cc0044}
.po.sel-card{border-color:#3b82f6;background:rgba(59,130,246,.12);color:#1d4ed8}
.po.sel-cash{border-color:#0e9488;background:rgba(14,148,136,.1);color:#0f766e}
.btn-confirm{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#e879a0,#7c3aed,#22d3ee);color:white;font-size:.95rem;font-weight:700;font-family:'Zen Kaku Gothic New',sans-serif;cursor:pointer;transition:all .2s;letter-spacing:.05em;box-shadow:0 4px 16px rgba(126,34,206,.3)}
.btn-confirm:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-confirm:disabled{opacity:.35;cursor:not-allowed;transform:none;filter:none}

/* MODALS */
.mbg{position:fixed;inset:0;z-index:200;background:rgba(59,7,100,.5);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px}
.mbg.show{display:flex}
.mc{background:rgba(255,245,255,.97);border:1px solid rgba(126,34,206,.2);border-radius:24px;padding:32px 28px;max-width:380px;width:100%;text-align:center;animation:pop .4s cubic-bezier(0.34,1.4,0.64,1);box-shadow:0 20px 60px rgba(126,34,206,.25)}
@keyframes pop{from{transform:scale(0.7) translateY(20px);opacity:0}to{transform:none;opacity:1}}
.me{font-size:3rem;margin-bottom:8px}
.mey{font-size:.72rem;color:#7c3aed;letter-spacing:2px;text-transform:uppercase;opacity:.8}
.mid{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,#be185d,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:6px 0 10px}
.mitems{font-size:.82rem;color:#5b21b6;line-height:1.9;margin-bottom:12px}
.mpay{display:inline-block;padding:5px 16px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:20px}
.mp-paypay{background:rgba(255,102,128,.15);color:#cc0044}
.mp-card{background:rgba(59,130,246,.12);color:#1d4ed8}
.mp-cash{background:rgba(14,148,136,.12);color:#0f766e}
.btn-mc{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#e879a0,#7c3aed);color:white;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-mc:hover{filter:brightness(1.08)}

/* GROUP SELECT */
.grp-list{display:flex;flex-direction:column;gap:8px;margin:14px 0;max-height:220px;overflow-y:auto}
.grp-item{padding:12px 16px;border-radius:12px;border:1px solid rgba(126,34,206,.2);background:rgba(255,255,255,.6);cursor:pointer;transition:all .2s;text-align:left;font-family:'Zen Kaku Gothic New',sans-serif}
.grp-item:hover{border-color:#7c3aed;background:rgba(167,139,250,.15)}
.grp-item-name{font-weight:600;font-size:.95rem;color:#3b0764;margin-bottom:2px}
.grp-item-meta{font-size:.72rem;color:#7c3aed}
.grp-or{text-align:center;color:#a855f7;font-size:.75rem;margin:8px 0;display:flex;align-items:center;gap:8px;opacity:.7}
.grp-or::before,.grp-or::after{content:'';flex:1;height:1px;background:rgba(126,34,206,.2)}
.fc{width:100%;padding:9px 12px;border-radius:10px;background:rgba(255,255,255,.7);border:1px solid rgba(126,34,206,.25);color:#3b0764;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.9rem;outline:none;transition:border .2s}
.fc:focus{border-color:#7c3aed}
.btn-start{width:100%;margin-top:10px;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#e879a0,#7c3aed,#22d3ee);color:white;font-weight:700;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.9rem;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(126,34,206,.3)}
.btn-start:hover{filter:brightness(1.08)}

/* FF TIMER (order side) */
.ff-timer-order{
  background:rgba(255,255,255,.25);
  border:1px solid rgba(255,255,255,.4);
  border-radius:14px;padding:12px 16px;
  backdrop-filter:blur(8px);
}
.ff-timer-order-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ff-timer-order-label{font-size:.72rem;color:rgba(255,255,255,.7);letter-spacing:1px;text-transform:uppercase}
.ff-timer-order-time{
  font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;
  color:white;letter-spacing:.04em;text-align:center;margin-bottom:6px;
}
.ff-timer-order-time.warning{color:#ff8080;animation:pulse .8s infinite alternate}
.ff-timer-order-time.expired{color:rgba(255,255,255,.4)}
.ff-timer-order-bar{height:6px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden}
.ff-timer-order-fill{height:100%;border-radius:3px;background:rgba(255,255,255,.7);transition:width 1s linear}
.ff-timer-order-fill.warning{background:#ff8080}
.ff-timer-order-sub{display:flex;justify-content:space-between;margin-top:6px;font-size:.72rem;color:rgba(255,255,255,.6)}
@keyframes pulse{from{opacity:1}to{opacity:.4}}

#toast{position:fixed;bottom:200px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(255,245,255,.95);border:1px solid rgba(126,34,206,.3);color:#3b0764;padding:9px 22px;border-radius:30px;font-size:.82rem;z-index:500;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;box-shadow:0 4px 20px rgba(126,34,206,.2)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:40px 20px;color:#7c3aed;font-size:.85rem;opacity:.7}
.empty span{display:block;font-size:2rem;margin-bottom:8px}
</style>
</head>
<body>

<!-- GROUP SELECT MODAL -->
<div class="mbg show" id="grp-modal">
  <div class="mc" style="text-align:left;max-height:90vh;overflow-y:auto">
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:2.2rem;margin-bottom:6px">🍸</div>
      <div style="font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,#be185d,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2px">JUNO</div>
      <div style="font-size:.68rem;letter-spacing:4px;text-transform:uppercase;color:#7c3aed;opacity:.7;margin-bottom:16px">Bar &amp; Lounge</div>
      <div style="font-size:1.05rem;font-weight:700;color:#1e0533;margin-bottom:4px">お名前を入力してください</div>
      <div style="font-size:.75rem;color:#7c3aed;opacity:.7">ご注文の履歴管理に使用します</div>
    </div>
    <div id="grp-list-wrap">
      <div class="grp-list" id="grp-list"></div>
      <div class="grp-or">または新しいお名前で注文</div>
    </div>
    <input class="fc" id="grp-name-input" placeholder="お名前・グループ名（例：山田様）" maxlength="40" style="margin-bottom:12px">

    <!-- プラン選択 -->
    <div style="margin-bottom:12px">
      <div style="font-size:.72rem;color:#6b21a8;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">プランを選んでください</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <label id="order-plan-normal-label" style="display:flex;align-items:center;gap:10px;padding:11px 14px;border:2px solid rgba(126,34,206,.25);border-radius:12px;cursor:pointer;background:rgba(255,255,255,.5);transition:all .2s">
          <input type="radio" name="order-plan" value="normal" checked onchange="onOrderPlanChange()" style="accent-color:#7c3aed">
          <div>
            <div style="font-weight:700;font-size:.9rem;color:#1e0533">通常注文</div>
            <div style="font-size:.72rem;color:#7c3aed;margin-top:1px">飲んだ分だけお会計</div>
          </div>
        </label>
        <label id="order-plan-ff-label" style="display:flex;align-items:center;gap:10px;padding:11px 14px;border:2px solid rgba(126,34,206,.25);border-radius:12px;cursor:pointer;background:rgba(255,255,255,.5);transition:all .2s">
          <input type="radio" name="order-plan" value="freeflow" onchange="onOrderPlanChange()" style="accent-color:#7c3aed">
          <div style="flex:1">
            <div style="font-weight:700;font-size:.9rem;color:#1e0533">🍹 フリーフロー</div>
            <div style="font-size:.72rem;color:#7c3aed;margin-top:1px">2時間飲み放題</div>
          </div>
          <div style="font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:#7c3aed">¥5,000<span style="font-size:.7rem;font-weight:400">/人</span></div>
        </label>
      </div>
    </div>

    <!-- 人数（フリーフロー時のみ表示） -->
    <div id="order-ff-pax-wrap" style="display:none;margin-bottom:12px;padding:12px 14px;background:rgba(126,34,206,.07);border-radius:12px;border:1px solid rgba(126,34,206,.2)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:.82rem;font-weight:600;color:#1e0533">人数</span>
        <div style="display:flex;align-items:center;gap:10px">
          <button onclick="adjOrderPax(-1)" type="button" style="width:30px;height:30px;border-radius:50%;border:1px solid rgba(126,34,206,.3);background:white;color:#7c3aed;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">−</button>
          <span id="order-pax-num" style="font-size:1.3rem;font-weight:700;color:#7c3aed;min-width:24px;text-align:center">2</span>
          <button onclick="adjOrderPax(1)" type="button" style="width:30px;height:30px;border-radius:50%;border:1px solid #7c3aed;background:rgba(126,34,206,.1);color:#7c3aed;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">＋</button>
          <span style="font-size:.8rem;color:#6b21a8">名</span>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:.82rem">
        <span style="color:#6b21a8">合計料金</span>
        <span id="order-ff-price-preview" style="font-weight:700;color:#7c3aed;font-family:'Playfair Display',serif;font-size:1rem">¥10,000</span>
      </div>
      <div style="font-size:.72rem;color:#9333ea;margin-top:4px;text-align:right">制限時間：2時間（120分）</div>
    </div>

    <button class="btn-start" onclick="startGroup()">注文をはじめる →</button>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="mbg" id="conf-modal">
  <div class="mc">
    <div class="me">🥂</div>
    <div class="mey">Order Confirmed</div>
    <div class="mid" id="conf-id"></div>
    <div class="mitems" id="conf-items"></div>
    <div id="conf-pay"></div>
    <button class="btn-mc" onclick="closeConf()">閉じる</button>
  </div>
</div>

<div class="hero">
  <div class="juno-logo">
    <div class="juno-logo-text">JUNO</div>
    <div class="juno-tagline">Bar &amp; Lounge</div>
  </div>
  <div class="hero-title">JUNO ORDER</div>
  <div class="hero-sub">ご注文はこちらから</div>
  <div class="grp-badge" id="grp-badge" onclick="openGrpModal()">👥 グループ選択中...</div>
  <!-- フリーフロータイマー（お客様画面） -->
  <div id="order-ff-timer" style="display:none;margin-top:14px;max-width:340px;margin-left:auto;margin-right:auto"></div>
</div>

<div class="hot-wrap" id="hot-wrap">
  <div class="hot-lbl">🔥 本日の人気</div>
  <div id="hot-items"></div>
</div>

<div class="bw">
  <div style="height:16px"></div>
  <div class="cat-row" id="cat-row"></div>
  <div class="sec-lbl" id="sec-lbl">ALL ITEMS</div>
  <div class="prod-list" id="prod-list"></div>
</div>

<div id="cart-drawer">
  <div class="ci">
    <div class="cart-pull"></div>
    <div class="cart-hd" onclick="toggleCart()">
      <div class="cart-hl">
        <div class="cb" id="cart-badge">0</div>
        <span class="cart-lbl">🧾 注文内容を確認</span>
      </div>
      <span class="cart-ttl" id="cart-prev">¥0</span>
    </div>
    <div class="cart-body" id="cart-body">
      <div id="cart-rows"></div>
      <div class="ctr"><span>合計</span><span id="cart-total">¥0</span></div>
      <div class="pay-row">
        <div class="po" id="po-paypay" onclick="selPay('paypay')"><span class="pi">📱</span>PayPay</div>
        <div class="po" id="po-card" onclick="selPay('card')"><span class="pi">💳</span>クレジット</div>
        <div class="po" id="po-cash" onclick="selPay('cash')"><span class="pi">💴</span>現金</div>
      </div>
      <button class="btn-confirm" id="btn-confirm" onclick="placeOrder()" disabled>注文を確定する →</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
// ── Firebase ──────────────────────────────────────────
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getDatabase, ref, set, push, get, onValue, update }
  from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBnaClKKb3zSz26YtDwOlyP3rrIH26_wNg",
  authDomain: "juno-bar.firebaseapp.com",
  databaseURL: "https://juno-bar-default-rtdb.firebaseio.com",
  projectId: "juno-bar",
  storageBucket: "juno-bar.firebasestorage.app",
  messagingSenderId: "508301491845",
  appId: "1:508301491845:web:af51f491aa60a7e4b9b3ec"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── 定数 ──────────────────────────────────────────────
const CE = {ドリンク:'🍸',フード:'🍟',おつまみ:'🍢',デザート:'🍮',ノンアル:'🥤',その他:'✨'};
const DP = [
  {id:'d1',name:'ハイボール',price:600,category:'ドリンク',ownership:'owner',active:true},
  {id:'d2',name:'ジントニック',price:700,category:'ドリンク',ownership:'owner',active:true},
  {id:'d3',name:'生ビール',price:600,category:'ドリンク',ownership:'tenant',active:true},
  {id:'d4',name:'ハウスワイン（グラス）',price:800,category:'ドリンク',ownership:'owner',active:true},
  {id:'d5',name:'モスコミュール',price:750,category:'ドリンク',ownership:'owner',active:true},
  {id:'f1',name:'フライドポテト',price:500,category:'フード',ownership:'tenant',active:true},
  {id:'f2',name:'枝豆',price:380,category:'おつまみ',ownership:'tenant',active:true},
  {id:'f3',name:'チーズ盛り合わせ',price:900,category:'おつまみ',ownership:'tenant',active:true},
  {id:'n1',name:'ジンジャーエール',price:450,category:'ノンアル',ownership:'tenant',active:true},
];

// ── ステート ──────────────────────────────────────────
let cart={}, pay=null, cartOpen=false, cat='all', sessId=null, grpName=null;
let fbProducts=[], fbOrders=[], fbSessions={};

// ── Firebase リアルタイム購読 ─────────────────────────
onValue(ref(db,'products'), snap => {
  const val = snap.val();
  fbProducts = val ? Object.values(val).filter(p=>p.active) : DP.filter(p=>p.active);
  renderCats(); renderProds(); renderHot();
});
onValue(ref(db,'orders'), snap => {
  const val = snap.val();
  fbOrders = val ? Object.values(val) : [];
  renderHot();
});
onValue(ref(db,'sessions'), snap => {
  fbSessions = snap.val() || {};
  renderGrpList();
  // セッション中ならタイマー更新
  if(sessId && fbSessions[sessId]) updateOrderTimer(fbSessions[sessId]);
});

// ── 商品取得（ローカルフォールバック付き）─────────────
function getP(){ return fbProducts.length ? fbProducts : DP.filter(p=>p.active); }
function getO(){ return fbOrders; }
function getS(){ return fbSessions; }

// ── 初期商品をFirebaseに書き込む（初回のみ）────────────
async function initProducts(){
  const snap = await get(ref(db,'products'));
  if(!snap.exists()){
    const obj={};
    DP.forEach(p=>{ obj[p.id]=p; });
    await set(ref(db,'products'), obj);
  }
}
initProducts();

// ── GROUP MODAL ───────────────────────────────────────
window.openGrpModal = function(){
  renderGrpList();
  document.getElementById('grp-modal').classList.add('show');
};
function renderGrpList(){
  const open = Object.values(getS()).filter(s=>s.status==='open');
  const wrap = document.getElementById('grp-list-wrap');
  if(!open.length){ wrap.style.display='none'; return; }
  wrap.style.display='block';
  document.getElementById('grp-list').innerHTML = open.map(s=>`
    <button class="grp-item" onclick="joinGroup('${s.id}')">
      <div class="grp-item-name">👥 ${s.groupName}</div>
      <div class="grp-item-meta">開始 ${fmtTime(s.openedAt)} ／ ${(s.orderIds||[]).length}オーダー</div>
    </button>`).join('');
}
window.joinGroup = function(id){
  const s = getS()[id];
  sessId=id; grpName=s.groupName;
  document.getElementById('grp-badge').textContent=`👥 ${grpName}`;
  document.getElementById('grp-modal').classList.remove('show');
  startOrderTimer(s);
  renderHot(); renderCats(); renderProds();
};
// ── ORDER PLAN ────────────────────────────────────────
let orderPax = 2;

window.onOrderPlanChange = function(){
  const plan = document.querySelector('input[name="order-plan"]:checked').value;
  document.getElementById('order-ff-pax-wrap').style.display = plan==='freeflow' ? 'block' : 'none';
};
window.adjOrderPax = function(d){
  orderPax = Math.max(1, orderPax + d);
  document.getElementById('order-pax-num').textContent = orderPax;
  document.getElementById('order-ff-price-preview').textContent = `¥${(orderPax*5000).toLocaleString()}`;
};

window.startGroup = async function(){
  const name = document.getElementById('grp-name-input').value.trim();
  if(!name){ toast('お名前を入力してください'); return; }
  const plan = document.querySelector('input[name="order-plan"]:checked').value;
  const now = new Date();
  const ymd = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  const cnt = Object.keys(getS()).filter(k=>k.startsWith(ymd)).length;
  const id  = `${ymd}-G${String(cnt+1).padStart(3,'0')}`;
  const newSess = {
    id, groupName:name, status:'open',
    openedAt:now.toISOString(), orderIds:[], plan
  };
  if(plan==='freeflow'){
    newSess.ffPax       = orderPax;
    newSess.ffPrice     = orderPax * 5000;
    newSess.ffDuration  = 120;
    newSess.ffStartedAt = now.toISOString();
    newSess.ffEndsAt    = new Date(now.getTime() + 120*60*1000).toISOString();
  }
  await set(ref(db,`sessions/${id}`), newSess);
  sessId=id; grpName=name;
  document.getElementById('grp-badge').textContent=`👥 ${name}${plan==='freeflow'?' 🍹':''}`;
  document.getElementById('grp-modal').classList.remove('show');
  document.getElementById('grp-name-input').value='';
  // プラン表示をリセット
  document.querySelector('input[name="order-plan"][value="normal"]').checked=true;
  document.getElementById('order-ff-pax-wrap').style.display='none';
  orderPax=2;
  startOrderTimer(newSess);
  renderHot(); renderCats(); renderProds();
};

// ── HOT ──────────────────────────────────────────────
function renderHot(){
  const cnt={};
  getO().filter(o=>o.status!=='cancelled').forEach(o=>o.items.forEach(i=>{
    cnt[i.productId]=(cnt[i.productId]||0)+i.qty;
  }));
  const r = getP().map(p=>({...p,c:cnt[p.id]||0})).sort((a,b)=>b.c-a.c).filter(p=>p.c>0).slice(0,3);
  const w = document.getElementById('hot-wrap');
  if(!r.length){ w.style.display='none'; return; }
  w.style.display='block';
  document.getElementById('hot-items').innerHTML = r.map((p,i)=>`
    <div class="hot-item">
      <div class="hot-rank ${i===0?'r1':i===1?'r2':''}">${i+1}</div>
      <div class="hot-name">${CE[p.category]||'✨'} ${p.name}</div>
      <div class="hot-cnt">${p.c}オーダー</div>
    </div>`).join('');
}

// ── PRODUCTS ──────────────────────────────────────────
function renderCats(){
  const cats=['all',...new Set(getP().map(p=>p.category))];
  document.getElementById('cat-row').innerHTML = cats.map(c=>`
    <button class="cat-tab ${c===cat?'on':''}" onclick="setCat('${c}',this)">
      ${c==='all'?'🍹 ALL':(CE[c]||'')+' '+c}
    </button>`).join('');
}
window.setCat = function(c,b){
  cat=c;
  document.querySelectorAll('.cat-tab').forEach(x=>x.classList.remove('on')); b.classList.add('on');
  document.getElementById('sec-lbl').textContent = c==='all'?'ALL ITEMS':c.toUpperCase();
  renderProds();
};
function renderProds(){
  let prods = getP();
  if(cat!=='all') prods=prods.filter(p=>p.category===cat);
  const el = document.getElementById('prod-list');
  if(!prods.length){ el.innerHTML=`<div class="empty"><span>🍹</span>商品がありません</div>`; return; }
  el.innerHTML = prods.map(p=>`
    <div class="p-card ${cart[p.id]?'active':''}" id="pc-${p.id}">
      <div class="p-emo">${CE[p.category]||'✨'}</div>
      <div class="p-info">
        <div class="p-name">${p.name}</div>
        <div class="p-meta"><span class="odot odot-${p.ownership}"></span>${p.ownership==='owner'?'オーナー':'テナント'}</div>
      </div>
      <div class="p-price">¥${p.price.toLocaleString()}</div>
      <div class="qty-ctrl">
        <button class="q-btn" onclick="chg('${p.id}',-1)">−</button>
        <span class="q-num" id="qn-${p.id}">${cart[p.id]||0}</span>
        <button class="q-btn" onclick="chg('${p.id}',1)">＋</button>
      </div>
    </div>`).join('');
}
window.chg = function(pid,d){
  if(!sessId){ openGrpModal(); return; }
  cart[pid]=Math.max(0,(cart[pid]||0)+d);
  if(!cart[pid]) delete cart[pid];
  const qn=document.getElementById('qn-'+pid); if(qn) qn.textContent=cart[pid]||0;
  const card=document.getElementById('pc-'+pid); if(card) card.classList.toggle('active',!!cart[pid]);
  updDrawer();
};

// ── CART ──────────────────────────────────────────────
function updDrawer(){
  const prods=getP();
  const keys=Object.keys(cart);
  const total=keys.reduce((s,k)=>{const p=prods.find(x=>x.id===k);return s+(p?p.price*cart[k]:0)},0);
  const cnt=keys.reduce((s,k)=>s+cart[k],0);
  document.getElementById('cart-badge').textContent=cnt;
  document.getElementById('cart-prev').textContent=`¥${total.toLocaleString()}`;
  document.getElementById('cart-total').textContent=`¥${total.toLocaleString()}`;
  document.getElementById('cart-drawer').classList.toggle('show',cnt>0);
  document.getElementById('cart-rows').innerHTML=keys.map(k=>{
    const p=prods.find(x=>x.id===k); if(!p) return'';
    return`<div class="cr"><span>${p.name} × ${cart[k]}</span><span style="color:var(--amber)">¥${(p.price*cart[k]).toLocaleString()}</span></div>`;
  }).join('');
  document.getElementById('btn-confirm').disabled=!pay||cnt===0;
}
window.toggleCart = function(){ cartOpen=!cartOpen; document.getElementById('cart-body').classList.toggle('open',cartOpen); };
window.selPay = function(m){
  pay=m;
  ['paypay','card','cash'].forEach(x=>{
    const el=document.getElementById('po-'+x); el.className='po';
    if(x===m) el.classList.add('sel-'+m);
  });
  document.getElementById('btn-confirm').disabled=Object.keys(cart).length===0;
};

// ── PLACE ORDER ───────────────────────────────────────
window.placeOrder = async function(){
  if(!sessId||!Object.keys(cart).length||!pay) return;
  const prods = getP();
  const keys  = Object.keys(cart);
  const items = keys.map(k=>{
    const p=prods.find(x=>x.id===k);
    return{productId:k,name:p.name,price:p.price,qty:cart[k],ownership:p.ownership,category:p.category};
  });
  const total = items.reduce((s,i)=>s+i.price*i.qty,0);
  const ot    = items.filter(i=>i.ownership==='owner').reduce((s,i)=>s+i.price*i.qty,0);
  const tt    = items.filter(i=>i.ownership==='tenant').reduce((s,i)=>s+i.price*i.qty,0);
  const now   = new Date();
  const ymd   = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  const cnt   = getO().filter(o=>o.id&&o.id.startsWith(ymd)).length;
  const id    = `${ymd}-${String(cnt+1).padStart(3,'0')}`;
  const order = {id,timestamp:now.toISOString(),sessionId:sessId,groupName:grpName,items,total,ownerTotal:ot,tenantTotal:tt,payment:pay,status:'pending'};

  // Firebaseに書き込み
  await set(ref(db,`orders/${id}`), order);
  // セッションのorderIdsを更新
  const sess = getS()[sessId];
  const newIds = [...(sess.orderIds||[]), id];
  await update(ref(db,`sessions/${sessId}`), {orderIds: newIds});

  // 確認モーダル表示
  const pN={paypay:'📱 PayPay',card:'💳 クレジット',cash:'💴 現金'};
  const pC={paypay:'mp-paypay',card:'mp-card',cash:'mp-cash'};
  document.getElementById('conf-id').textContent=id;
  document.getElementById('conf-items').innerHTML=items.map(i=>`${i.name} × ${i.qty}　¥${(i.price*i.qty).toLocaleString()}`).join('<br>')+`<br><strong style="color:var(--gold)">合計 ¥${total.toLocaleString()}</strong>`;
  document.getElementById('conf-pay').innerHTML=`<span class="mpay ${pC[pay]}">${pN[pay]}</span>`;
  document.getElementById('conf-modal').classList.add('show');

  // リセット
  cart={}; pay=null; cartOpen=false;
  document.getElementById('cart-body').classList.remove('open');
  document.getElementById('cart-drawer').classList.remove('show');
  ['paypay','card','cash'].forEach(m=>document.getElementById('po-'+m).className='po');

  // セッション・名前をリセット（次のお客様のため）
  sessId=null; grpName=null;
  document.getElementById('grp-badge').textContent='👥 グループ選択中...';
  document.getElementById('grp-name-input').value='';
  document.querySelector('input[name="order-plan"][value="normal"]').checked=true;
  document.getElementById('order-ff-pax-wrap').style.display='none';
  document.getElementById('order-ff-timer').style.display='none';
  if(orderTimerInterval){ clearInterval(orderTimerInterval); orderTimerInterval=null; }
  orderPax=2;

  renderProds();
};
window.closeConf = function(){
  document.getElementById('conf-modal').classList.remove('show');
  // 次のお客様のためにグループ選択を再表示
  renderGrpList();
  document.getElementById('grp-modal').classList.add('show');
};

// ── UTILS ─────────────────────────────────────────────
function fmtTime(iso){ const d=new Date(iso); return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }

// ── フリーフロータイマー（お客様画面）─────────────────
const FF_MS = 120 * 60 * 1000;
let orderTimerInterval = null;

function startOrderTimer(sess){
  if(orderTimerInterval){ clearInterval(orderTimerInterval); orderTimerInterval=null; }
  updateOrderTimer(sess);
  if(sess && sess.plan==='freeflow'){
    orderTimerInterval = setInterval(()=>{
      const s = getS()[sessId];
      if(s) updateOrderTimer(s);
    }, 1000);
  }
}

function updateOrderTimer(sess){
  const el = document.getElementById('order-ff-timer');
  if(!el) return;
  if(!sess || sess.plan!=='freeflow' || sess.status!=='open'){
    el.style.display='none'; return;
  }
  const startedAt = sess.ffStartedAt || sess.openedAt;
  const endTime   = sess.ffEndsAt
    ? new Date(sess.ffEndsAt)
    : new Date(new Date(startedAt).getTime() + FF_MS);
  const ms  = endTime - new Date();
  const totalSec = Math.max(0, Math.floor(ms/1000));
  const m   = Math.floor(totalSec/60);
  const s   = totalSec % 60;
  const timeStr = ms<=0 ? '終了' : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const cls = ms<=0 ? 'expired' : ms<=10*60*1000 ? 'warning' : '';
  const pct = Math.max(0, Math.min(100, (ms/FF_MS)*100));
  const endStr = `${String(endTime.getHours()).padStart(2,'0')}:${String(endTime.getMinutes()).padStart(2,'0')}`;

  el.style.display = 'block';
  el.innerHTML = `
    <div class="ff-timer-order">
      <div class="ff-timer-order-top">
        <span class="ff-timer-order-label">⏱ フリーフロー残り時間</span>
        <span style="font-size:.72rem;color:rgba(255,255,255,.6)">${sess.ffPax||1}名 ¥${(sess.ffPrice||5000).toLocaleString()}</span>
      </div>
      <div class="ff-timer-order-time ${cls}">${timeStr}</div>
      <div class="ff-timer-order-bar">
        <div class="ff-timer-order-fill ${cls}" style="width:${pct}%"></div>
      </div>
      <div class="ff-timer-order-sub">
        <span>開始 ${fmtTime(startedAt)}</span>
        <span>終了 ${endStr}</span>
      </div>
    </div>`;

  // 終了通知（1回）
  if(ms<=0 && ms>-2000){ toast('⏰ フリーフローの時間が終了しました'); }
}
</script>
</body>
</html>
